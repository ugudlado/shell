name: bugfix
version: 1
description: >
  Structured bugfix workflow. Enforces root-cause investigation before any fix.
  Requires a regression test to prove the bug and prevent recurrence.
  Use for bugs, regressions, incidents, and defects.

artifacts:
  - id: diagnosis
    generates: diagnosis.md
    description: Bug investigation — symptoms, reproduction, root cause analysis
    template: diagnosis.md
    requires: []

  - id: fix-plan
    generates: fix-plan.md
    description: Fix strategy — approach, affected files, risk assessment
    template: fix-plan.md
    requires:
      - diagnosis

  - id: tasks
    generates: tasks.md
    description: Fix tasks — regression test, implementation, verification
    template: tasks.md
    requires:
      - fix-plan

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    Work through tasks in phase order. Mark [→] when starting, [x] when done.

    BUGFIX RULES:
    - Phase 1: Root cause investigation using `systematic-debugging` skill
    - Phase 2: Write regression test that PROVES the bug (MUST FAIL before fix)
    - Phase 3: Implement fix — root cause only, not symptoms
    - Keep fixes minimal — no "while I'm here" improvements
    - Regression test MUST pass after fix, zero other tests broken

    PHASE GATES:
    - Run: type-check, test, build
    - Regression test must pass
    - No other tests broken (zero regressions)
    - Invoke `phase-review` skill — target >= 9/10
    - Auto-commit after phase passes review

    FINAL REVIEW (in parallel):
    - `phase-review` skill (Codex + Claude code reviewer)
    - pr-review-toolkit:silent-failure-hunter

    VERIFICATION BUGS:
    - If verification reveals new issues, add them as tasks in the current phase
    - Do NOT skip to the next phase with known issues
    - New tasks get the next available T-number with a letter suffix (e.g., T-7b)
    - Each new task must have Why, Files, and Verify fields

    ON FAILURE: Invoke `systematic-debugging` skill. No guess-fixes.
    COMMIT PREFIX: fix:
