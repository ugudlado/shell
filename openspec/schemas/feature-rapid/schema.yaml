name: feature-rapid
version: 1
description: >
  Fast feature development without test requirements. Use for prototypes,
  spikes, tooling, scripts, config changes, and developer experience work.

artifacts:
  - id: spec
    generates: spec.md
    description: Full specification — motivation, requirements, architecture, alternatives
    template: spec.md
    requires: []

  - id: design
    generates: design.md
    description: Technical design — components, data flow, error handling
    template: design.md
    requires:
      - spec

  - id: tasks
    generates: tasks.md
    description: Phased task list with dependencies and parallel markers
    template: tasks.md
    requires:
      - spec
      - design

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    Work through tasks in phase order. Mark [→] when starting, [x] when done.
    Tasks marked [P] can run in parallel. Respect (depends: Txxx) annotations.

    NO TEST REQUIREMENTS — tests are optional, not enforced.

    PHASE GATES:
    - Run: type-check, build (skip test if none exist)
    - Invoke `phase-review` skill — target >= 9/10
    - If UI components changed: invoke `/critique` for UX review
    - Max 3 iterations to fix feedback, then escalate
    - Auto-commit after phase passes review

    FINAL REVIEW (in parallel):
    - `phase-review` skill (Codex + Claude code reviewer)
    - pr-review-toolkit:silent-failure-hunter
    - If UI: `/critique` for design quality

    VERIFICATION BUGS:
    - If verification reveals new issues, add them as tasks in the current phase
    - Do NOT skip to the next phase with known issues
    - New tasks get the next available T-number with a letter suffix (e.g., T-5b)
    - Each new task must have Why, Files, and Verify fields

    ON FAILURE: Invoke `systematic-debugging` skill. No guess-fixes.
    COMMIT PREFIX: feat:
