<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlgoViz — Levenshtein Distance</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="algo-nav">
    <a href="index.html" class="active">Levenshtein Distance</a>
    <a href="elevator.html">Elevator (SCAN)</a>
    <a href="bfs.html">BFS Pathfinding</a>
    <a href="dfs.html">DFS Pathfinding</a>
    <a href="knapsack.html">Knapsack (0/1)</a>
    <a href="bubble-sort.html">Bubble Sort</a>
    <a href="bst.html">BST Traversal</a>
    <a href="merge-sort.html">Merge Sort</a>
    <a href="binary-search.html">Binary Search</a>
    <a href="lcs.html">LCS</a>
    <a href="dijkstra.html">Dijkstra</a>
  </nav>

  <h1>AlgoViz <span class="subtitle">Levenshtein Distance</span></h1>

  <div class="controls">
    <div class="inputs">
      <label>Source: <input type="text" id="stringA" value="kitten" maxlength="20"></label>
      <label>Target: <input type="text" id="stringB" value="sitting" maxlength="20"></label>
      <button id="btnVisualize">Visualize</button>
    </div>
    <div class="buttons hidden" id="playback">
      <button id="btnReset">Reset</button>
      <button id="btnStepBack">&larr; Step</button>
      <button id="btnPlay">Play</button>
      <button id="btnPause" disabled>Pause</button>
      <button id="btnStep">Step &rarr;</button>
      <label>Speed: <input type="range" id="speed" min="1" max="10" value="5"></label>
    </div>
  </div>

  <div id="info" class="info">Enter two strings and click <strong>Visualize</strong> to begin.</div>

  <div class="legend">
    <span class="swatch match"></span> Match (M)
    <span class="swatch substitute"></span> Substitute (S)
    <span class="swatch insert"></span> Insert (I)
    <span class="swatch delete"></span> Delete (D)
    <span class="swatch current"></span> Current
    <span class="swatch traceback"></span> Traceback
  </div>

  <div id="matrix-container"></div>

  <div id="result" class="result hidden"></div>

  <script src="script.js"></script>
</body>
</html>
